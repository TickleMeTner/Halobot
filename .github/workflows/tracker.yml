name: Run Halo Tracker Bot

on:
  schedule:
    # Changed from '*/10 * * * *' to run every 20 minutes
    - cron: '*/20 * * * *'
  workflow_dispatch:
    # This keeps your manual "Run Workflow" button active in the Actions dashboard

jobs:
  sweep-and-ping:
    runs-on: ubuntu-latest
    steps:
      - name: Copy project code into cloud container
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Network Core Tools
        run: pip install requests

      - name: Fire Tracker Script
        run: python test.py